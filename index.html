<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventory</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#fff;
  color:#111;
}

header{
  text-align:center;
  padding:30px;
  border-bottom:1px solid #ddd;
}

h1{
  margin:0;
  font-size:42px;
}

.controls{
  max-width:1400px;
  margin:20px auto;
  padding:0 20px;
  display:flex;
  gap:12px;
  flex-wrap:wrap;
}

input,select{
  padding:12px;
  border:1px solid #ccc;
  border-radius:8px;
  font-size:15px;
}

input{
  flex:1;
  min-width:250px;
}

.inventory{
  max-width:1600px;
  margin:auto;
  padding:20px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:20px;
}

.card{
  border:1px solid #e5e5e5;
  border-radius:12px;
  overflow:hidden;
  background:#fff;
}

.card img{
  width:100%;
  height:220px;
  object-fit:cover;
  background:#f5f5f5;
}

.info{
  padding:15px;
}

.title{
  font-size:18px;
  font-weight:600;
  margin-bottom:6px;
}

.price{
  font-size:24px;
  font-weight:700;
  margin-bottom:8px;
}

.details{
  color:#666;
  margin-bottom:12px;
  line-height:1.4;
}

.btn{
  display:block;
  text-align:center;
  padding:10px;
  border-radius:8px;
  text-decoration:none;
  font-weight:600;
  background:#1877f2;
  color:#fff;
}
</style>
</head>

<body>

<header>
<h1>Inventory</h1>
</header>

<div class="controls">
<input id="search" placeholder="Search inventory...">

<select id="sort">
<option value="">Sort</option>
<option value="priceLow">Price Low → High</option>
<option value="priceHigh">Price High → Low</option>
<option value="yearNew">Year New → Old</option>
<option value="yearOld">Year Old → New</option>
</select>
</div>

<div class="inventory" id="inventory"></div>

<script>

const SHEET_URL =
"https://docs.google.com/spreadsheets/d/1LGeq8OOEyDZUbEAKPsyOeMKIpBt2gRQGpFL22UZ3szI/gviz/tq?tqx=out:json";

let vehicles = [];

function parseSheet(text){
  const json = JSON.parse(text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1));
  const rows = json.table.rows;

  return rows.map(r => ({

    year: r.c?.[0]?.v || "",
    make: r.c?.[1]?.v || "",
    model: r.c?.[2]?.v || "",
    type: r.c?.[3]?.v || "",
    price: Number(r.c?.[4]?.v || 0),
    stock: r.c?.[5]?.v || "",
    status: (r.c?.[6]?.v || "").toLowerCase(),
    images: (r.c?.[7]?.v || "").split(";").map(x => x.trim()).filter(Boolean)

  }));
}

async function loadData(){

try{

const res = await fetch(SHEET_URL);
const text = await res.text();

vehicles = parseSheet(text)
.filter(v => v.status === "available");

render();

}catch(err){
console.log(err);
document.getElementById("inventory").innerHTML =
"<p style='padding:20px'>Failed to load inventory. Check sheet sharing settings.</p>";
}

}

function render(){

let list = [...vehicles];

const q = document.getElementById("search").value.toLowerCase();

list = list.filter(v =>
`${v.year} ${v.make} ${v.model} ${v.type} ${v.stock}`
.toLowerCase()
.includes(q)
);

const sort = document.getElementById("sort").value;

switch(sort){

case "priceLow":
list.sort((a,b)=>a.price-b.price);
break;

case "priceHigh":
list.sort((a,b)=>b.price-a.price);
break;

case "yearNew":
list.sort((a,b)=>b.year-a.year);
break;

case "yearOld":
list.sort((a,b)=>a.year-b.year);
break;

}

document.getElementById("inventory").innerHTML =
list.map(v => {

const img = v.images[0] || "https://via.placeholder.com/600x400?text=No+Image";

return `
<div class="card">

<img src="${img}">

<div class="info">

<div class="title">
${v.year} ${v.make} ${v.model}
</div>

<div class="price">
$${Number(v.price).toLocaleString()}
</div>

<div class="details">
${v.type}<br>
Stock: ${v.stock}
</div>

<a class="btn" href="https://www.cashbydaily.com/inquiry" target="_blank">
Schedule
</a>

</div>

</div>
`;

}).join("");

}

document.getElementById("search").addEventListener("input",render);
document.getElementById("sort").addEventListener("change",render);

loadData();

</script>

</body>
</html>
