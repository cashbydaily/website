<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Inventory</title>

<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #fff;
    color: #111;
  }

  header {
    padding: 26px;
    text-align: center;
    border-bottom: 1px solid #eee;
  }

  header h1 { margin: 0; font-size: 40px; }

  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    padding: 20px;
    max-width: 1200px;
    margin: auto;
  }

  .controls input, .controls select {
    height: 44px;
    padding: 0 12px;
    border: 1px solid #ddd;
    border-radius: 10px;
    font-size: 14px;
  }

  .controls input { flex: 1; min-width: 220px; }

  .search-btn {
    height: 44px;
    padding: 0 16px;
    border: none;
    border-radius: 10px;
    background: #111;
    color: #fff;
    font-weight: 700;
    cursor: pointer;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
    padding: 20px;
    max-width: 1400px;
    margin: auto;
  }

  .card {
    border: 1px solid #eee;
    border-radius: 14px;
    overflow: hidden;
    background: #fff;
    cursor: pointer;
  }

  .card:hover { box-shadow: 0 10px 25px rgba(0,0,0,.08); }

  .img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    display: block;
    background: #f3f3f3;
  }

  .content { padding: 12px; }

  .title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .price { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
  .meta { font-size: 13px; color: #666; }

  .chips {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 10px;
  }

  .chip {
    font-size: 11px;
    padding: 5px 8px;
    border-radius: 999px;
    border: 1px solid #ddd;
  }

  /* MODAL */
  .modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.85);
    z-index: 9999;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  .panel {
    background: #fff;
    width: min(1000px, 100%);
    border-radius: 16px;
    overflow: hidden;
    max-height: 92vh;
  }

  /* MEDIA AREA */
  .media {
    position: relative;
    background: #000;
    width: 100%;
    height: 420px;
    overflow: hidden;
  }

  .media img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    background: #000;
  }

  /* ✅ ARROWS FIXED */
  .arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 50px;
    height: 50px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    font-size: 26px;
    font-weight: bold;
    background: rgba(255,255,255,0.95);
    color: #111;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .arrow.left { left: 10px; }
  .arrow.right { right: 10px; }

  .arrow:hover {
    background: #fff;
  }

  .dots {
    position: absolute;
    bottom: 10px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    gap: 6px;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    border: none;
    background: #555;
  }

  .dot.active { background: #fff; }

  .info { padding: 14px; }

  .grid2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    font-size: 13px;
  }

  .btns {
    display: flex;
    gap: 10px;
    margin-top: 14px;
  }

  .btn {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-weight: 700;
  }

  .primary { background: #1877f2; color: #fff; }
  .dark { background: #111; color: #fff; }
  .light { background: #eee; }
</style>
</head>

<body>

<header>
  <h1>Inventory</h1>
</header>

<div class="controls">
  <input id="search" placeholder="Search inventory..." />
  <button class="search-btn" onclick="runSearch()">Search</button>
</div>

<div class="grid" id="grid"></div>

<!-- DETAILS -->
<div class="modal" id="modal">
  <div class="panel">

    <div class="media">
      <button class="arrow left" onclick="prev()">‹</button>
      <button class="arrow right" onclick="next()">›</button>

      <div id="mediaBox" style="width:100%;height:100%;"></div>

      <div class="dots" id="dots"></div>
    </div>

    <div class="info">
      <div class="title" id="title"></div>
      <div class="price" id="price"></div>

      <div class="grid2" id="infoGrid"></div>

      <div class="btns">
        <button class="btn primary" onclick="window.open(INQUIRY_URL,'_blank')">Schedule</button>
        <button class="btn dark" onclick="copyLink()">Share</button>
        <button class="btn light" onclick="closeModal()">Close</button>
      </div>
    </div>

  </div>
</div>

<script>
const SHEET_ID = "1LGeq8OOEyDZUbEAKPsyOeMKIpBt2gRQGpFL22UZ3szI";
const INQUIRY_URL = "https://www.cashbydaily.com/inquiry";

const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?headers=1&tqx=out:json;responseHandler=loadData`;

let data = [];
let filtered = [];
let current = 0;
let mediaIndex = 0;

/* STOCK URL AUTO SEARCH */
function getStockFromURL(){
  return new URLSearchParams(window.location.search).get("stock") || "";
}

/* MEDIA */
function parseMedia(desc=""){
  return desc.split(";").map(x=>x.trim()).filter(Boolean);
}

/* LOAD */
function loadData(res){
  data = res.table.rows.map(r=>({
    year:r.c[0]?.v||"",
    make:r.c[1]?.v||"",
    model:r.c[2]?.v||"",
    type:r.c[3]?.v||"",
    price:r.c[4]?.v||"",
    stock:r.c[5]?.v||"",
    status:r.c[6]?.v||"",
    media:parseMedia(r.c[7]?.v||"")
  }));

  render();

  const stock = getStockFromURL();
  if(stock){
    document.getElementById("search").value = stock;
    render();
  }
}

/* RENDER */
function render(){
  const q = document.getElementById("search").value.toLowerCase();

  filtered = data.filter(v =>
    (v.year+v.make+v.model+v.stock).toLowerCase().includes(q)
  );

  document.getElementById("grid").innerHTML =
  filtered.map((v,i)=>`
    <div class="card" onclick="openDetails(${i})">
      <img class="img" src="${v.media[0] || ''}" />
      <div class="content">
        <div class="title">${v.year} ${v.make} ${v.model}</div>
        <div class="price">$${v.price}</div>
        <div class="meta">Stock: ${v.stock}</div>
      </div>
    </div>
  `).join("");
}

/* DETAILS */
function openDetails(i){
  current = i;
  mediaIndex = 0;

  const v = filtered[i];

  document.getElementById("modal").style.display="flex";
  document.getElementById("title").innerText =
    `${v.year} ${v.make} ${v.model}`;
  document.getElementById("price").innerText = `$${v.price}`;

  document.getElementById("infoGrid").innerHTML = `
    <div>Stock<br>${v.stock}</div>
    <div>Type<br>${v.type}</div>
    <div>Status<br>${v.status}</div>
  `;

  renderMedia();
}

function renderMedia(){
  const v = filtered[current];

  document.getElementById("mediaBox").innerHTML =
    `<img src="${v.media[mediaIndex]}" onerror="this.src='https://via.placeholder.com/800x400'">`;

  document.getElementById("dots").innerHTML =
    v.media.map((_,i)=>`
      <button class="dot ${i===mediaIndex?'active':''}" onclick="setMedia(${i})"></button>
    `).join("");
}

function setMedia(i){ mediaIndex=i; renderMedia(); }
function next(){ const v=filtered[current]; mediaIndex=(mediaIndex+1)%v.media.length; renderMedia(); }
function prev(){ const v=filtered[current]; mediaIndex=(mediaIndex-1+v.media.length)%v.media.length; renderMedia(); }

function closeModal(){ document.getElementById("modal").style.display="none"; }

function copyLink(){
  const v = filtered[current];
  navigator.clipboard.writeText(`${location.origin}?stock=${v.stock}`);
}

function runSearch(){ render(); }

/* LOAD SHEET */
const script=document.createElement("script");
script.src=URL;
document.body.appendChild(script);
</script>

</body>
</html>
