<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Inventory</title>
<style>
  :root{
    --border:#e7e7e7;
    --text:#111;
    --muted:#666;
    --blue:#1877f2;
    --dark:#111;
    --bg:#fff;
    --card:#fff;
    --shadow:0 10px 28px rgba(0,0,0,.08);
    --radius:14px;
  }

  *{ box-sizing:border-box; }
  body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:var(--bg);
    color:var(--text);
  }

  header{
    padding:28px 20px;
    text-align:center;
    border-bottom:1px solid var(--border);
    background:#fff;
    position:sticky;
    top:0;
    z-index:5;
  }

  header h1{
    margin:0;
    font-size:42px;
    line-height:1.1;
    letter-spacing:.5px;
  }

  .controls{
    max-width:1500px;
    margin:20px auto 0;
    padding:0 20px;
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    align-items:center;
  }

  .controls input,
  .controls select{
    height:46px;
    border:1px solid #cfcfcf;
    border-radius:10px;
    padding:0 14px;
    font-size:15px;
    background:#fff;
    color:#111;
    outline:none;
  }

  .controls input{
    flex:1 1 260px;
    min-width:240px;
  }

  .controls select{
    flex:0 0 220px;
  }

  .meta,
  .status-line{
    max-width:1500px;
    margin:10px auto 0;
    padding:0 20px;
    color:var(--muted);
    font-size:14px;
  }

  .status-line{
    min-height:20px;
  }

  .inventory{
    max-width:1500px;
    margin:18px auto 40px;
    padding:0 20px;
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));
    gap:20px;
  }

  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    overflow:hidden;
    transition:transform .16s ease, box-shadow .16s ease;
  }

  .card:hover{
    transform:translateY(-3px);
    box-shadow:var(--shadow);
  }

  .main-image{
    width:100%;
    height:220px;
    object-fit:cover;
    display:block;
    background:#f5f5f5;
  }

  .thumbs{
    display:flex;
    gap:8px;
    padding:10px 12px 0;
    flex-wrap:wrap;
  }

  .thumb{
    width:56px;
    height:56px;
    border:1px solid #ddd;
    border-radius:10px;
    overflow:hidden;
    padding:0;
    background:#fff;
    cursor:pointer;
    flex:0 0 auto;
  }

  .thumb img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }

  .info{
    padding:14px 14px 16px;
  }

  .title{
    font-size:18px;
    font-weight:700;
    margin:0 0 8px;
    line-height:1.3;
  }

  .price{
    font-size:28px;
    font-weight:800;
    margin:0 0 8px;
  }

  .details{
    color:var(--muted);
    font-size:14px;
    line-height:1.5;
    margin-bottom:14px;
    min-height:42px;
  }

  .chips{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-bottom:14px;
  }

  .chip{
    font-size:12px;
    padding:6px 10px;
    border:1px solid #ddd;
    border-radius:999px;
    background:#fafafa;
    color:#333;
  }

  .status-chip.in-stock{
    background:#e7f7ea;
    color:#1f7a3f;
    border-color:#cfe9d3;
  }

  .status-chip.sold{
    background:#ffe5e5;
    color:#a30000;
    border-color:#f4caca;
  }

  .buttons{
    display:flex;
    gap:10px;
  }

  .btn{
    flex:1;
    text-decoration:none;
    text-align:center;
    padding:12px 10px;
    border-radius:10px;
    font-weight:700;
    font-size:14px;
  }

  .btn.primary{
    background:var(--blue);
    color:#fff;
  }

  .btn.secondary{
    background:var(--dark);
    color:#fff;
  }

  .empty,
  .error{
    grid-column:1/-1;
    padding:26px;
    border-radius:14px;
    text-align:center;
    background:#fff;
  }

  .empty{
    border:1px dashed #ccc;
    color:var(--muted);
  }

  .error{
    border:1px solid #f0c3c3;
    color:#8b1e1e;
    background:#fff6f6;
  }

  @media (max-width: 640px){
    header h1{ font-size:34px; }
    .controls select{ flex:1 1 220px; }
    .main-image{ height:200px; }
    .price{ font-size:25px; }
  }
</style>
</head>
<body>

<header>
  <h1>Inventory</h1>
</header>

<div class="controls">
  <input id="search" type="text" placeholder="Search inventory..." />

  <select id="typeFilter">
    <option value="">All Types</option>
    <option value="coupe">Coupe</option>
    <option value="sedan">Sedan</option>
    <option value="suv">SUV</option>
    <option value="truck">Truck</option>
    <option value="other">Other</option>
  </select>

  <select id="sort">
    <option value="yearNew">Year High → Low</option>
    <option value="yearOld">Year Low → High</option>
    <option value="priceLow">Price Low → High</option>
    <option value="priceHigh">Price High → Low</option>
    <option value="stockAz">Stock A → Z</option>
    <option value="stockZa">Stock Z → A</option>
  </select>
</div>

<div class="meta" id="meta">Loading inventory...</div>
<div class="status-line" id="statusLine"></div>
<div class="inventory" id="inventory"></div>

<script>
  const SHEET_ID = "1LGeq8OOEyDZUbEAKPsyOeMKIpBt2gRQGpFL22UZ3szI";
  const GID = 0;

  const SHEET_URL =
    `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?gid=${GID}&headers=1&tqx=out:json;responseHandler:inventorySheetLoaded`;

  const PLACEHOLDER_IMAGE =
    "data:image/svg+xml;charset=UTF-8," +
    encodeURIComponent(`
      <svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
        <rect width="1200" height="800" fill="#f3f3f3"/>
        <rect x="120" y="170" width="960" height="460" rx="30" fill="#e5e5e5"/>
        <text x="600" y="420" font-family="Arial, Helvetica, sans-serif" font-size="54" text-anchor="middle" fill="#888">
          No Photo Available
        </text>
      </svg>
    `);

  let vehicles = [];

  const inventoryEl = document.getElementById("inventory");
  const metaEl = document.getElementById("meta");
  const statusEl = document.getElementById("statusLine");
  const searchEl = document.getElementById("search");
  const sortEl = document.getElementById("sort");
  const typeFilterEl = document.getElementById("typeFilter");

  function escapeHtml(value) {
    return String(value ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#39;");
  }

  function toNumber(value) {
    const n = Number(String(value ?? "").replace(/[^0-9.-]/g, ""));
    return Number.isFinite(n) ? n : 0;
  }

  function parseImages(description) {
    return String(description ?? "")
      .split(";")
      .map(s => s.trim())
      .filter(Boolean);
  }

  function normalizeText(v) {
    return String(v ?? "").trim();
  }

  function normalizeStatus(v) {
    return String(v ?? "")
      .toLowerCase()
      .replace(/[^a-z0-9]/g, "");
  }

  function vehicleSort(a, b, mode) {
    const yearA = toNumber(a.year);
    const yearB = toNumber(b.year);
    const priceA = toNumber(a.price);
    const priceB = toNumber(b.price);
    const stockA = normalizeText(a.stock).toLowerCase();
    const stockB = normalizeText(b.stock).toLowerCase();

    switch (mode) {
      case "priceLow":
        return priceA - priceB;
      case "priceHigh":
        return priceB - priceA;
      case "yearOld":
        return yearA - yearB;
      case "yearNew":
        return yearB - yearA;
      case "stockAz":
        return stockA.localeCompare(stockB, undefined, { numeric: true, sensitivity: "base" });
      case "stockZa":
        return stockB.localeCompare(stockA, undefined, { numeric: true, sensitivity: "base" });
      default:
        return yearB - yearA;
    }
  }

  function setCardImage(cardId, imageUrl) {
    const img = document.getElementById(`main-img-${cardId}`);
    if (img && imageUrl) img.src = imageUrl;
  }

  window.setCardImage = setCardImage;

  function render() {
    const query = searchEl.value.trim().toLowerCase();
    const sortMode = sortEl.value;
    const typeFilter = typeFilterEl.value.trim().toLowerCase();

    let list = [...vehicles];

    if (query || typeFilter) {
      list = list.filter(v => {
        const haystack = [
          v.year, v.make, v.model, v.type, v.price, v.stock, v.status
        ].join(" ").toLowerCase();

        const matchSearch = query ? haystack.includes(query) : true;
        const matchType = typeFilter ? v.type.toLowerCase() === typeFilter : true;

        return matchSearch && matchType;
      });
    }

    list.sort((a, b) => vehicleSort(a, b, sortMode));

    metaEl.textContent = `${list.length} vehicle${list.length === 1 ? "" : "s"} found`;

    if (!list.length) {
      inventoryEl.innerHTML = `<div class="empty">No in-stock inventory found.</div>`;
      return;
    }

    inventoryEl.innerHTML = list.map((v, index) => {
      const images = v.images.length ? v.images : [PLACEHOLDER_IMAGE];
      const cardId = `${index}-${String(v.stock).replace(/[^a-z0-9_-]/gi, "") || "car"}`;
      const mainImage = escapeHtml(images[0]);
      const title = `${escapeHtml(v.year)} ${escapeHtml(v.make)} ${escapeHtml(v.model)}`.trim();
      const typeLine = escapeHtml(v.type);
      const stockLine = escapeHtml(v.stock);
      const priceLine = Number(toNumber(v.price)).toLocaleString();

      const statusNormalized = normalizeStatus(v.status);
      const isSold = statusNormalized.includes("sold");
      const isInStock = statusNormalized.includes("instock") || statusNormalized.includes("instock");
      const statusClass = isSold ? "sold" : "in-stock";
      const statusLabel = isSold ? "SOLD" : (isInStock ? "IN STOCK" : (v.status ? v.status.toUpperCase() : "IN STOCK"));

      const thumbs = images.slice(0, 6).map((img, i) => `
        <button class="thumb" type="button" onclick="setCardImage('${cardId}', '${String(img).replaceAll("'", "\\'")}')">
          <img src="${escapeHtml(img)}" alt="Photo ${i + 1}">
        </button>
      `).join("");

      return `
        <article class="card">
          <img
            id="main-img-${cardId}"
            class="main-image"
            src="${mainImage}"
            alt="${title}"
            onerror="this.src='${PLACEHOLDER_IMAGE}'"
          >

          ${images.length > 1 ? `<div class="thumbs">${thumbs}</div>` : ""}

          <div class="info">
            <div class="chips">
              <span class="chip status-chip ${statusClass}">${statusLabel}</span>
              ${v.type ? `<span class="chip">${escapeHtml(v.type)}</span>` : ""}
            </div>

            <div class="title">${title}</div>
            <div class="price">$${priceLine}</div>

            <div class="details">
              ${typeLine ? `${typeLine}<br>` : ""}
              ${stockLine ? `Stock: ${stockLine}` : ""}
            </div>

            <div class="buttons">
              <a class="btn primary" href="https://www.cashbydaily.com/inquiry" target="_blank" rel="noopener">Schedule</a>
              <a class="btn secondary" href="javascript:void(0)" onclick="navigator.clipboard.writeText('${stockLine.replaceAll("'", "\\'")}')">Copy Stock</a>
            </div>
          </div>
        </article>
      `;
    }).join("");
  }

  function loadSheetViaScript() {
    statusEl.textContent = "Loading sheet...";

    const existing = document.getElementById("sheet-loader");
    if (existing) existing.remove();

    const script = document.createElement("script");
    script.id = "sheet-loader";
    script.async = true;
    script.src = `${SHEET_URL}&_=${Date.now()}`;

    script.onerror = () => {
      metaEl.textContent = "Could not load the sheet.";
      statusEl.textContent = "";
      inventoryEl.innerHTML = `
        <div class="error">
          The inventory did not load. Make sure the sheet is shared as <strong>Anyone with the link</strong> or <strong>Public on the web</strong>, and that row 1 contains:
          <br><br>
          Year | Make | Model | Type | Price | Stock | Status | Description
        </div>
      `;
    };

    document.body.appendChild(script);
  }

  window.inventorySheetLoaded = function(data) {
    try {
      const rows = data?.table?.rows || [];

      vehicles = rows.map(row => ({
        year: normalizeText(row.c?.[0]?.v || ""),
        make: normalizeText(row.c?.[1]?.v || ""),
        model: normalizeText(row.c?.[2]?.v || ""),
        type: normalizeText(row.c?.[3]?.v || ""),
        price: normalizeText(row.c?.[4]?.v || ""),
        stock: normalizeText(row.c?.[5]?.v || ""),
        status: normalizeText(row.c?.[6]?.v || ""),
        images: parseImages(row.c?.[7]?.v || "")
      }));

      const total = vehicles.length;
      const inStockCount = vehicles.filter(v => {
        const s = normalizeStatus(v.status);
        return s.includes("instock") || s.includes("instk");
      }).length;

      statusEl.textContent = `Loaded ${total} rows. In-stock rows detected: ${inStockCount}.`;

      vehicles = vehicles.filter(v => {
        const s = normalizeStatus(v.status);
        return s.includes("instock") || s.includes("instk");
      });

      render();
    } catch (err) {
      console.error(err);
      metaEl.textContent = "Inventory load error.";
      statusEl.textContent = "";
      inventoryEl.innerHTML = `<div class="error">The sheet loaded, but the data format did not match the expected columns.</div>`;
    }
  };

  searchEl.addEventListener("input", render);
  sortEl.addEventListener("change", render);
  typeFilterEl.addEventListener("change", render);

  loadSheetViaScript();
</script>
</body>
</html>
